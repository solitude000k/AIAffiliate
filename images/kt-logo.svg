<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">

  <!-- ══ フォーク（左） ══ -->
  <g>
    <!-- 柄（下側） -->
    <path d="M38 105 Q37 180 39 185 Q40.5 188 42 185 Q44 180 43 105 Z" fill="#D4A843"/>
    <!-- ネック（くびれ） -->
    <path d="M39 105 Q38 90 39.5 80 L41.5 80 Q43 90 42 105 Z" fill="#D4A843"/>
    <!-- 歯×4 -->
    <rect x="31" y="28" width="2.2" height="50" rx="1.1" fill="#D4A843"/>
    <rect x="35" y="25" width="2.2" height="53" rx="1.1" fill="#D4A843"/>
    <rect x="39" y="25" width="2.2" height="53" rx="1.1" fill="#D4A843"/>
    <rect x="43" y="28" width="2.2" height="50" rx="1.1" fill="#D4A843"/>
    <!-- 歯の付け根（横つなぎ） -->
    <path d="M31 76 Q37.5 82 46 76 L46 80 Q37.5 87 31 80 Z" fill="#D4A843"/>
    <!-- ハイライト -->
    <line x1="36.5" y1="30" x2="36.5" y2="78" stroke="rgba(255,240,180,.3)" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- ══ お皿（中央） ══ -->
  <!-- 影 -->
  <circle cx="102" cy="96" r="58" fill="rgba(0,0,0,0.12)"/>
  <!-- 外リム（赤茶） -->
  <circle cx="100" cy="93" r="58" fill="#7A2E10"/>
  <!-- 中リム（やや明るい線） -->
  <circle cx="100" cy="93" r="50" fill="#1A0A04"/>
  <!-- 内円（深い黒） -->
  <circle cx="100" cy="93" r="42" fill="#0D0604"/>
  <!-- 内リムライン -->
  <circle cx="100" cy="93" r="42" fill="none" stroke="#3A1408" stroke-width="1.5"/>

  <!-- ══ ナイフ（右） ══ -->
  <g>
    <!-- 柄（下側） -->
    <path d="M157 105 Q156 180 158 185 Q159.5 188 161 185 Q163 180 162 105 Z" fill="#D4A843"/>
    <!-- ブレード（上部、片刃で右側がやや膨らむ） -->
    <path d="M158 105 L157 40 Q157 25 159.5 25 Q164 25 164 40 Q163 75 162 105 Z" fill="#D4A843"/>
    <!-- 刃ハイライト -->
    <line x1="159.5" y1="28" x2="159.5" y2="104" stroke="rgba(255,240,180,.25)" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- ══ 箸（皿の下、横向き2本平行） ══ -->
  <!-- 上の箸（細い本体） -->
  <path d="M52 170 Q75 169 148 170 Q150 170.5 150 172 Q150 173.5 148 174 Q75 175 52 174 Q49 173 49 172 Q49 171 52 170 Z" fill="#C8956A"/>
  <!-- 上の箸・右端チップ（ゴールド） -->
  <rect x="148" y="169.5" width="6" height="5" rx="2" fill="#D4A843"/>
  <!-- 上の箸ハイライト -->
  <line x1="55" y1="171.5" x2="147" y2="171.5" stroke="rgba(255,240,200,.2)" stroke-width=".8" stroke-linecap="round"/>

  <!-- 下の箸（細い本体） -->
  <path d="M52 182 Q75 181 148 182 Q150 182.5 150 184 Q150 185.5 148 186 Q75 187 52 186 Q49 185 49 184 Q49 183 52 182 Z" fill="#C8956A"/>
  <!-- 下の箸・右端チップ（ゴールド） -->
  <rect x="148" y="181.5" width="6" height="5" rx="2" fill="#D4A843"/>
  <!-- 下の箸ハイライト -->
  <line x1="55" y1="183.5" x2="147" y2="183.5" stroke="rgba(255,240,200,.2)" stroke-width=".8" stroke-linecap="round"/>

</svg>
